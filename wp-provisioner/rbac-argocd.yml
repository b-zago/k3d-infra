apiVersion: v1
kind: ServiceAccount
metadata:
  name: wp-provisioner
  namespace: wp-provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-application-manager
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wordpress-api-argocd
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: wp-provisioner
    namespace: wp-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-application-manager
