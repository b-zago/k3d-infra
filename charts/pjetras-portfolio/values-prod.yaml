env: prod
deployments:
  - component: server
    containerPort: 80
    image: ghcr.io/b-zago/pjetras-portfolio/webserver:8959e5a
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: nginx
routes:
  - host: pjetras-portfolio.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 80
