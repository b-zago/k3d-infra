{{- define "lib.secret" -}}
{{- required "A valid .Values.secrets.runsOnList is required!" .Values.secrets.runsOnList -}}
{{- range .Values.secrets -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    {{- if .runsOn }}
    runs-on: {{ .runsOn }}
    {{- end }}
    {{- range .runsOnList }}
    runs-on-{{ . }}: "true"
    {{- end }}
    instance: {{ $.Release.Name }}-{{ .name }}
    component: {{ .component | default "sealedSecret" }}
    part-of: {{ $.Release.Name }}
spec:
  encryptedData:
{{ toYaml .data | indent 4 }}
  template:
    metadata:
      name: {{ $.Release.Name }}-{{ .name }}
      labels:
        {{- if .runsOn }}
        runs-on: {{ .runsOn }}
        {{- end }}
        {{- range .runsOn }}
        runs-on-{{ . }}: "true"
        {{- end }}
        instance: {{ $.Release.Name }}-{{ .name }}
        component: {{ .component | default "secret" }}
        part-of: {{ $.Release.Name }}
---
{{- end -}}
{{- end -}}