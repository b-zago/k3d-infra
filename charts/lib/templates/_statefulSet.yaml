{{- define "lib.statefulSet" -}}
{{- range .Values.statefulSets -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ .name }}Svc
  labels:
    runs-on: {{ $.Release.Name }}-{{ .name }}
    instance: {{ $.Release.Name }}-{{ .name }}Svc
    component: service
    part-of: {{ $.Release.Name }}
spec:
  clusterIP: None
  selector:
    instance: {{ $.Release.Name }}-{{ .name }}
  ports:
    - port: {{ .containerPort }}
      targetPort: {{ .containerPort }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  labels:
    runs-on: {{ .runsOn }}
    instance: {{ $.Release.Name }}-{{ .name }}
    component: {{ .component | default "db"}}
    part-of: {{ $.Release.Name }}
spec:
  serviceName: {{ $.Release.Name }}-{{ .name }}Svc
  replicas: 1
  selector:
    matchLabels:
      instance: {{ $.Release.Name }}-{{ .name }}
  template:
    metadata:
      labels:
        runs-on: {{ .runsOn }}
        instance: {{ $.Release.Name }}-{{ .name }}
        component: {{ .component | default "database"}}
        part-of: {{ $.Release.Name }}
    spec:
      {{- if $.Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: {{ $.Release.Name }}-{{ .name }}
          image: {{ .image}}
          imagePullPolicy: Always
          {{- if .envSecretRef }}
          envFrom:
            - secretRef:
                name: {{ $.Release.Name }}-{{ .envSecretRef }}
          {{- end }}
          {{- if .envVars }}
          env:
          {{- range .envVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
          {{- end }}
          {{- end }}
          ports:
            - containerPort: {{ .containerPort }}
          volumeMounts:
            - mountPath: {{ .mountPath }}
              name: {{ $.Release.Name }}-{{ .name }}
  volumeClaimTemplates:
    - metadata:
        name: {{ $.Release.Name }}-{{ .name }}
        labels:
          runs-on: {{ .name }}
          instance: {{ $.Release.Name }}-{{ .name }}
          component: {{ .component | default "privateVolumeClaim"}}
          part-of: {{ $.Release.Name }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .storage }}
---
{{- end -}}
{{- end -}}