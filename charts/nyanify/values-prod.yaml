env: prod
deployments:
  - component: server
    containerPort: 8000
    envSecretRefs:
      - web-server-envs
    image: ghcr.io/b-zago/nyanify/webserver:71e2f0d
    imagePullSecret: ghcr-creds
    name: web-server
    runsOn: python
routes:
  - host: nyanify.zagoapps.com
    name: web-server-route
    runsOn: web-server-service
secrets:
  - data:
      HMAC_KEY: 
      TOKEN: 
    name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
services:
  - name: web-server-service
    port: 80
    runsOn: web-server
    targetPort: 8000
