env: ""

#scoped to ns anyway so its fine being here
imagePullSecret: ghcr-creds

services:
  - name: web-server-service
    runsOn: web-server
    port: 80
    targetPort: 8000

routes:
  - name: web-server-route
    runsOn: web-server-service
    host: nyanify.zagoapps.com

secrets:
  - name: web-server-envs
    runsOn: web-server
    runsOnList:
      - web-server
    data:
      HMAC_KEY: ""
      TOKEN: ""

deployments:
  - name: web-server
    image: ghcr.io/b-zago/nyanify/web-server:latest
    runsOn: python
    component: server
    containerPort: 8000
    envSecretRefs:
      - web-server-envs

#headless service created automatically here
statefulSets:
  - name: db
    runsOn: postgresql
    image: ghcr.io/b-zago/nyanify/db:latest
    component: db
    mounPath: /var/lib/postgresql #container mountpath
    storage: 1Gi
